<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>УЗЕ — Первинна КП</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="../css/telegram.css" />
  <script src="../js/uze-catalog-data.js"></script>
  <script src="../js/catalog.js"></script>
  <script src="../js/uze-calculate-engine.js"></script>
</head>

<body>
<div class="app">

  <!-- Header -->
  <div class="page-header">
    <span class="page-icon">🔋</span>
    <h1 class="page-title">УЗЕ · Первинна КП</h1>
  </div>

  <!-- ==================== ФОРМА ==================== -->
  <div id="uzeForm">
    <div class="card form-card">

      <div class="field">
        <label for="project_name">Назва проєкту</label>
        <input id="project_name" type="text" placeholder="ТОВ САНТЕКО ГРУП" autocomplete="off" />
      </div>

      <div class="field">
        <label for="manager">Менеджер</label>
        <select id="manager">
          <option value="">Оберіть менеджера</option>
        </select>
      </div>

      <div class="field">
        <label for="region">Регіон</label>
        <select id="region">
          <option value="">Оберіть регіон</option>
          <option>Вінницька область</option>
          <option>Волинська область</option>
          <option>Дніпропетровська область</option>
          <option>Житомирська область</option>
          <option>Закарпатська область</option>
          <option>м. Київ</option>
          <option>Київська область</option>
          <option>Кіровоградська область</option>
          <option>Львівська область</option>
          <option>Одеська область</option>
          <option>Полтавська область</option>
          <option>Івано-Франківська область</option>
          <option>Рівненська область</option>
          <option>Тернопільська область</option>
          <option>Хмельницька область</option>
          <option>Черкаська область</option>
          <option>Чернівецька область</option>
          <option>Чернігівська область</option>
          <option>Запорізька область</option>
          <option>Миколаївська область</option>
          <option>Сумська область</option>
          <option>Харківська область</option>
          <option>Херсонська область</option>
        </select>
      </div>

      <div class="field">
        <label for="uze_model">Модель УЗЕ</label>
        <select id="uze_model">
          <option value="">Завантаження каталогу...</option>
        </select>
      </div>

      <div class="field">
        <label for="uze_qty">Кількість УЗЕ</label>
        <div id="qtyWrap">
          <select id="uze_qty" disabled style="width:100%">
            <option value="">Спочатку оберіть модель</option>
          </select>
        </div>
        <div id="qtyError" class="qty-error"></div>
      </div>

      <div class="field">
        <label for="uze_vat">Вартість УЗЕ</label>
        <select id="uze_vat">
          <option value="без ПДВ">без ПДВ</option>
          <option value="з ПДВ">з ПДВ</option>
        </select>
      </div>

      <div class="field">
        <label for="equipment_vat">Вартість обладнання та матеріалів</label>
        <select id="equipment_vat">
          <option value="з ПДВ">з ПДВ</option>
          <option value="без ПДВ">без ПДВ</option>
        </select>
      </div>

      <div class="field">
        <label for="currency">Валюта</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
        </select>
      </div>

      <div class="field">
        <label for="usage_type">Тип використання</label>
        <select id="usage_type">
          <option value="На власне споживання">На власне споживання</option>
          <option value="Арбітраж на підприємстві">Арбітраж на підприємстві</option>
        </select>
      </div>

      <div class="field">
        <label for="delivery_term">Термін доставки</label>
        <select id="delivery_term">
          <option>1 місяць</option>
          <option>2 місяці</option>
          <option>3 місяці</option>
          <option>3–4 місяці</option>
          <option>3,5–4 місяці</option>
          <option>4–4,5 місяця</option>
          <option>4–5 місяців</option>
          <option>5 місяців</option>
          <option>4,5–6 місяців</option>
        </select>
      </div>

      <div class="field">
        <label for="payment_terms">Умови оплати</label>
        <select id="payment_terms">
          <option>100% передплата</option>
          <option>30% аванс, 70% перед відвантаженням з заводу</option>
        </select>
      </div>

    </div>

    <div id="formError" style="color:#e53935;font-size:13px;text-align:center;padding:4px 16px;min-height:20px"></div>

    <button class="primary-btn" id="submitBtn">Підготувати КП</button>
  </div>

  <!-- ==================== PREVIEW ==================== -->
  <div id="uzePreview" style="display:none">

    <div class="card" style="margin-bottom:12px">
      <div class="step-title" style="margin-bottom:8px">Перевірка КП</div>
      <div id="pvSummary"></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#FFC400;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Ціна УЗЕ</div>
      <div id="pvUzePrice"></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#FFC400;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Обладнання та роботи</div>
      <div id="pvEquipment"></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div id="pvTotals"></div>
    </div>

    <div id="pvError" style="color:#e53935;font-size:13px;text-align:center;padding:4px 16px;min-height:20px"></div>

    <div style="display:flex;gap:10px;padding:0 16px 16px">
      <button class="nav-btn back-btn" id="pvBackBtn" style="flex:1">← Назад</button>
      <button class="primary-btn" id="pvSendBtn" style="flex:2;margin:0">📤 Відправити КП</button>
    </div>

  </div>

</div>

<script src="../js/uze/uze.js"></script>
</body>
</html>
